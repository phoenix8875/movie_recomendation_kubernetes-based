{{- /*
  Same Secret as db/02-secret.yaml, but the three credential values now come
  from .Values.db.credentials instead of being hardcoded. stringData still lets
  Kubernetes base64-encode for us. quote wraps each value in "" so a value like
  a number-only password can't be misread by YAML.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: {{ .Values.namespaces.db }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.db.credentials.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.credentials.password | quote }}
  POSTGRES_DB: {{ .Values.db.credentials.database | quote }}
