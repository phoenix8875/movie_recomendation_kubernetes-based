apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: {{ .Values.namespaces.frontend }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ printf "%s:%s" .Values.frontend.image.repository .Values.frontend.image.tag }}
          ports:
            - containerPort: {{ .Values.frontend.containerPort }}
