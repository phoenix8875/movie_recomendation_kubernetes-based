# values.yaml — every hardcoded literal from your old YAML, lifted into one place.
# Templates read these via {{ .Values.<path> }}. Change a value here once and
# every template that references it updates. Override at install time with
# --set db.storage.size=1Gi  OR  -f staging-values.yaml

# --- namespaces -------------------------------------------------------------
namespaces:
  db: db-ns-helm
  backend: backend-ns-helm
  frontend: frontend-ns-helm

# --- database tier ----------------------------------------------------------
db:
  image: postgres:16-alpine
  replicas: 1
  storage:
    size: 100Mi
    className: local-path
  # these become the db-credentials Secret
  credentials:
    user: movieuser
    password: moviepass
    database: moviedb

# --- backend tier (filled in next step) -------------------------------------
backend:
  image:
    repository: raj8875/movie-recommender-backend
    tag: "2.0"
  replicas: 1
  port: 8000
  tmdbApiKey: "PUT_YOUR_TMDB_KEY_HERE"

# --- frontend tier (filled in next step) ------------------------------------
frontend:
  image:
    repository: raj8875/movie-recommender-frontend
    tag: "2.0"
  replicas: 1
  containerPort: 80
  nodePort: 30080
