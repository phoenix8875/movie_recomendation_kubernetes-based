# db/02-secret.yaml
#
# WHAT THIS FILE DOES:
# Stores the Postgres credentials as a Kubernetes Secret, inside db-ns.
# The official postgres image reads these exact variable names
# (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB) on first startup to
# initialize the database — same as it did via .env in Docker Compose.
#
# WHY A SECRET INSTEAD OF A CONFIGMAP:
# A ConfigMap is for non-sensitive config. A Secret is for sensitive values
# (passwords, keys). Kubernetes stores Secret values base64-ENCODED, not
# encrypted — base64 is just a text format, anyone with access to read this
# Secret can trivially decode it. Real protection comes from RBAC (who is
# allowed to read Secrets in this namespace) and, in production clusters,
# enabling encryption-at-rest for etcd. Worth saying out loud: "Secrets are
# not secret by default, they're just separated and access-controlled."
#
# stringData lets us write plain text here and Kubernetes base64-encodes it
# for us automatically when the object is created (vs. "data:" where you'd
# have to pre-encode the values yourself).

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: db-ns
type: Opaque
stringData:
  POSTGRES_USER: movieuser
  POSTGRES_PASSWORD: moviepass
  POSTGRES_DB: moviedb
