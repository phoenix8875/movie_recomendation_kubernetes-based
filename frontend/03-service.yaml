# frontend/03-service.yaml
#
# WHAT THIS FILE DOES:
# Exposes the frontend OUTSIDE the cluster — this is the one Service in the
# whole project that real users actually need to reach.
#
# WHY type: NodePort (not ClusterIP):
# ClusterIP (what we used for db and backend) is internal-only by design —
# correct for those, wrong here. NodePort opens a specific port on EVERY
# node in the cluster, forwarding traffic into this Service. Since you have
# one EC2 node, hitting <ec2-public-ip>:<nodePort> reaches this Service.
#
# NodePort range in Kubernetes is restricted to 30000-32767 by default —
# that's why we can't just say "80" here the way we did with plain Docker.
# We're using 30080 as the external port.
#
# (A real production setup would typically use a LoadBalancer type instead,
# which provisions an actual cloud load balancer with a clean port like 80
# — but that requires cloud-provider integration we haven't set up. NodePort
# is the right, honest choice for a single-node k3s learning setup.)

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend-ns
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
